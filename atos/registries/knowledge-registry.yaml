version: 1.1.0
updated_at: "2026-07-24"
milestone: M9
governing_spec: SPEC-003
governing_standard: STD-002
governing_architecture: KA-001
operations: atos/governance/knowledge-governance-operations.md
reorganization: atos/product/KA-REORG-001-knowledge-reorganization.md
load_manifest: atos/knowledge/LOAD-MANIFEST.md

canonical_authority:
  rule: one_canonical_source_per_domain
  stewardship: temporary_stewards_of_best_evidence_aligned_understanding
  atos_canonical_requires:
    - completed_promotion_pipeline
    - or_authoritative_constitutional_document
    - founder_institutional_approval_for_promotions
  draft_and_scaffold_are_not_canonical: true
  legacy_atlas_is_not_auto_canonical: true
  labeling:
    identity_interim: live under atlas/ until Founder cutover
    product_canonical: FLA-001 PCM-001 under atos/product/ with indexes here
    atos_canonical_library: promoted publications under atos/knowledge/canonical/
    operational: handoff decisions metrics — not Canonical law

planes:
  - id: PLANE-ATOS
    name: ATOS Governance Plane
    root: atos/
    authority: target
    state: authoritative
    loadable_as_canonical: false
    notes: Specs/Standards Authoritative (RES-002); knowledge stores under atos/knowledge/; KA-001 Accepted (RES-020)

  - id: PLANE-ATOS-CANONICAL
    name: ATOS Canonical Library
    root: atos/knowledge/canonical/
    authority: canonical
    state: domain-indexed
    loadable_as_canonical: true
    publications_count: 0
    domain_indexes: true
    product_canonical_indexed: true
    notes: >
      ATOS Canonical Library promoted-publication count may be 0 while Product Canonical
      (FLA/PCM) and Identity interim sources are indexed via certified pointers (KA-REORG-001).
      This is labeling clarity — not emptiness of all institutional knowledge.

  - id: PLANE-LEGACY-ATLAS
    name: Pre-ATOS Atlas Corpus
    root: atlas/
    authority: legacy-live
    state: authoritative-legacy
    loadable_as_canonical: true
    notes: Live Ask Atlas corpus per GOV-COMPAT; loader freeze unchanged; not auto-promoted

stores:
  working:
    ref: KNOW-WORKING
    path: atos/knowledge/working/
    state: active
    question_ledger: atos/knowledge/working/questions.md
  evidence:
    ref: KNOW-EVIDENCE
    path: atos/knowledge/evidence/
    state: active
    index: atos/knowledge/evidence/index/README.md
  promotion_queue:
    ref: REG-PROMO-Q
    path: atos/knowledge/promotion/queue.yaml
    state: draft
  canonical:
    ref: KNOW-CANONICAL
    path: atos/knowledge/canonical/
    state: domain-indexed
  archive:
    ref: KNOW-ARCHIVE
    path: atos/knowledge/archive/
    state: scaffold
  classifications:
    path: atos/knowledge/classifications/
    state: draft

promotion_pipeline:
  state: active
  standard: STD-002
  template: REF-R1110
  stages:
    - Observation
    - Investigation
    - Evidence Collection
    - Evidence Review
    - Recommendation
    - Executive Review
    - Institutional Approval
    - Canonical Publication
    - Historical Preservation
  queue:
    path: atos/knowledge/promotion/queue.yaml
    open_items: 0

confidence_levels:
  - Observation
  - Hypothesis
  - Investigated
  - Verified
  - Canonical
  - Superseded
  - Archived

legacy_classification:
